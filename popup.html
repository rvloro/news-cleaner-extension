<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup_style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
        <h1>News Cleaner</h1>
      </div>
      <label class="switch">
        <input type="checkbox" id="enabled">
        <span class="slider round"></span>
      </label>
    </header>

    <main>
      <div class="stat-card">
        <div class="stat-value" id="stats-count">0</div>
        <div class="stat-label">Éléments supprimés</div>
      </div>
    </main>

    <footer>
      <p id="site-status">Inactif sur ce site</p>
      <button id="reset-stats">Réinitialiser</button>
    </footer>
  </div>
  <script src="sites.js"></script>
  <script src="popup.js"></script>
</body>
</html>
